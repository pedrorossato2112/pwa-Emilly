<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ff4d6d" />

  <title>Nosso Álbum ❤️</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="top">
  <div class="brand">
    <div class="dot"></div>
    <div>
      <div class="title">Nosso Álbum</div>
      <div class="sub">fotos & cartinhas ❤️</div>
    </div>
  </div>

  <nav class="tabs">
    <button class="tab active" data-tab="album">Álbum</button>
    <button class="tab" data-tab="cartas">Cartinhas</button>
    <button class="tab" data-tab="backup">Backup</button>
  </nav>
</header>

<main class="wrap">

  <!-- ÁLBUM -->
  <section class="panel active" id="panel-album">
    <div class="card">
      <div class="row">
        <div>
          <div class="h">Adicionar fotos</div>
        </div>

        <label class="btn">
          + Selecionar
          <input id="photoInput" type="file" accept="image/*" multiple />
        </label>
      </div>
    </div>

    <div class="grid" id="photoGrid"></div>
    <div class="empty" id="emptyPhotos">Sem fotos ainda ❤️</div>
  </section>

  <!-- CARTAS -->
  <section class="panel" id="panel-cartas">
    <div class="card">
      <div class="h">Cartinhas</div>

      <input id="letterTo" class="inp" placeholder="Para (Emilly / Pedro)" />
      <input id="letterTitle" class="inp" placeholder="Título" />
      <textarea id="letterBody" class="inp area" placeholder="Escreve aqui..."></textarea>

      <button id="addLetterBtn" class="btn solid">Salvar cartinha</button>
    </div>

    <div class="list" id="letterList"></div>
    <div class="empty" id="emptyLetters">Sem cartinhas ainda ❤️</div>
  </section>

  <!-- BACKUP (opcional, não conectado ao Firebase agora) -->
  <section class="panel" id="panel-backup">
    <div class="card">
      <div class="h">Backup</div>
      <div class="p">Essa parte você pode usar depois se quiser.</div>
    </div>
  </section>

</main>

<!-- 🔥 IMPORTANTE: APP COMO MODULE -->
<script type="module" src="app.js"></script>

</body>
</html>
